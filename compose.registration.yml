name: grok2api

# Protocol registration clearance runtime. Combine this overlay with
# docker-compose.yml only when the protocol registration engine is used.
services:
  grok2api:
    environment:
      REGISTRATION_CAPTCHA_ENDPOINT: "http://grok-turnstile-solver:5072"
      REGISTRATION_CAPTCHA_CONCURRENCY: "${TURNSTILE_THREAD:-1}"
      NO_PROXY: "${NO_PROXY:-127.0.0.1,localhost,grok-web-browser,grok-turnstile-solver}"
    depends_on:
      grok-turnstile-solver:
        condition: service_healthy

  grok-turnstile-solver:
    image: "${GROK2API_SOLVER_IMAGE:-ghcr.io/owen891/grok2api:solver-0d48ecf8b4ee-fixed}"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      TURNSTILE_HOST: "0.0.0.0"
      TURNSTILE_PORT: "5072"
      TURNSTILE_THREAD: "${TURNSTILE_THREAD:-1}"
      TURNSTILE_BROWSER_TYPE: "camoufox"
      TURNSTILE_LAZY: "0"
      TURNSTILE_IDLE_SEC: "900"
      TURNSTILE_DEBUG: "${TURNSTILE_DEBUG:-0}"
      TURNSTILE_PROXY: "${REGISTRATION_SOLVER_PROXY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1gb"
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5072/health"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s
    security_opt:
      - seccomp:unconfined
