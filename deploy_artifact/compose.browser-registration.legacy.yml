name: grok2api

# Compatibility overlay for docker-compose.runtime.yml. Load this after the
# normal browser registration overlay so the prebuilt image is not rebuilt or
# hidden by release-directory bind mounts.
services:
  grok2api:
    build: !reset null
    volumes: !override
      - "${GROK2API_DEPLOY_DIR:-/opt/grok2api-deploy}/config.docker.yaml:/run/grok2api/config.yaml:ro"
      - "${GROK2API_DATA_DIR:-/opt/grok2api-data}:/app/data"
