name: grok2api

# Standard production stack. The host only needs Docker Engine + Compose.
# Application code and Python registration dependencies are shipped in GROK2API_IMAGE.
# Keep the password in config.production.yaml equal to POSTGRES_PASSWORD.
services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:?set GROK2API_IMAGE to an immutable tag or digest}"
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      GROK_WEB_BROWSER_WORKER_URL: "http://grok-web-browser:8192"
      GROK2API_REGISTRATION_COMMAND: "grok2api-registration"
      REGISTRATION_PROXY: "${REGISTRATION_PROXY:-}"
      REGISTRATION_SOLVER_PROXY: "${REGISTRATION_SOLVER_PROXY:-}"
      REGISTRATION_HTTP_PROXY: "${REGISTRATION_HTTP_PROXY:-}"
      REGISTRATION_HTTPS_PROXY: "${REGISTRATION_HTTPS_PROXY:-}"
      REGISTRATION_ALL_PROXY: "${REGISTRATION_ALL_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-127.0.0.1,localhost,grok-web-browser,postgres,redis}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./config.production.yaml:/run/grok2api/config.yaml:ro"
      - "./data:/app/data"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grok-web-browser:
        condition: service_healthy
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  postgres:
    container_name: grok2api-postgres
    image: "${POSTGRES_IMAGE:-postgres:16-alpine}"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-grok2api}"
      POSTGRES_USER: "${POSTGRES_USER:-grok2api}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    shm_size: "128mb"

  redis:
    container_name: grok2api-redis
    image: "${REDIS_IMAGE:-redis:7-alpine}"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  grok-web-browser:
    container_name: grok-web-browser
    image: "${FLARESOLVERR_IMAGE:-ghcr.io/flaresolverr/flaresolverr@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47}"
    command: ["/usr/local/bin/python", "-u", "/opt/grok-worker/grok_web_browser_worker.py", "--listen", "0.0.0.0:8192"]
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      HEADLESS: "true"
      LOG_LEVEL: info
      GROK_WORKER_LOOPBACK_PROXY_HOST: "host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "../scripts/grok_web_browser_worker.py:/opt/grok-worker/grok_web_browser_worker.py:ro"
    shm_size: "2gb"
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8192/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
  redis-data:
